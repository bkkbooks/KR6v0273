body:
  text: 之一碑陽定光像主劉回菩薩主前高平縣功曹楊茂并妻教化主董京并息鞏神和起像主玄氏朝陽二縣令鞏五并妻迦葉主鞏妻女都四面像主前郡録事鞏白龍大像主晉陽玄氏二縣令高市并妻鞏彌勒像主董世兒息元顯開光明主上黨北平二郡太守鞏廣周大齊主陽阿縣功曹王猛虎并妻祁思惟像主河間太守王朱兒佛殿主廣周妻李迎男起像齊主屯留陽二縣令董勉興阿難主董惡蛇并妻張磨女都邑主董慶玄供養右葙齊主玄氏令始供養菩薩主王寶供養主常流參軍王顯業并妻張思唯主妻祁曇奴阿羅漢主王五男都維那盟主董黃頭法性無言寄言以詮理真容妙極假像以表應佛有如是十力雄猛大悲為勿化緣既周雙林取寂佛雖去世遺留經像訓世是以千載之末有佛弟子董黃頭七十人等正信無邪生不值佛故契崇邑義造釋迦碑像一區彌勒慈氏及無量壽佛藥師定光思惟多寶阿難迦葉并諸菩薩以此微善願皇帝陛下延祚無窮四方慕化又願邑義諸人生生之處恆值諸佛聞法悟解法界衆生發菩提心速致作佛大齊天保九年歲次戊寅七月壬辰朔草七日戊午造大福德主董倪奴檀越主鞏薩胡之二碑陰西方像主建郡太守鞏伯都菩薩主侯興邑子楊万年邑子鞏小黑邑子董回洛邑子郭元邑子陽元和邑子董征邑子董愛敬邑子前郡功曹張祖北方像主王虎兒六佛都主京兆太守鞏世興邑子祁小興邑子王世樂邑子侯延義邑子蔣世德邑子纂敬遵邑子董兔兒邑子王二邑子鞏遵和釋迦像主遊防軍主鞏益生上方像主萇子令侯暗維那高清好維那董惡蚝維那侯牛生維那董秋多寶像主董富下方像主王羊回都維那董買德維那令寶維那前城局王榮世維那董狃南方像主董延興光明主董鍾葵妻張邑子董敬興邑子董太邑子韓元顯邑子王慶和邑子杜山華邑子王冕進邑子王午邑子王世洛東方像主郭匡侍佛都供養主鍾葵孫客兒邑子王豈邑子董黑邑子王和兒邑子劉虎子邑子鞏思義邑子董伯達邑子郭景悅邑子宰黑之三兩側菩薩主太原太守董黑成邑子王轉興邑子董茂和邑子李思業居士李方邑子董李奴邑子焦保收邑子陳黃頭居士董伯兒菩薩主董世華邑子郭董買邑子貴龍邑子董元伯邑子董范慶邑子部郡董道邑子道喜邑子楊長訓邑子前郡功曹高延功曹并妻鞏邑子郡功曹董慶云邑子太邑子侯青雀迦葉像主鞏市龍妻王阿姜邑子董神和邑子李永進邑子張邑子董伯德邑子高思祖邑子慶賓邑子無量壽像主倉曹參軍鞏市龍邑子成龍邑子王邑子鞏郭阿難主司徒懿祖邑子伯奴邑子郭荀子邑子胡仁邑倉曹參軍子邑董安
